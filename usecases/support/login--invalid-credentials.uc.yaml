id: support-login--invalid-credentials
title: "Login rejects wrong password with an accessible alert"
type: negative
description: |
  A staff user submits the login form with a wrong password. The form must
  render an alert (role="alert") with a clear message and keep the user on
  /login so they can retry without losing input focus.

start_location: "http://localhost:5174/login"

preconditions:
  - A staff user exists with the username below; the password below is NOT theirs.

data:
  email: "staff@acme.example"
  wrong_password: "definitely-wrong-pass"

steps:
  - locate: heading "Sign in"
  - enter: field "Email address" value "{{ email }}"
  - enter: field "Password" value "{{ wrong_password }}"
  - activate: button "Sign in"
  - verify: alert "Invalid email or password"
  - verify: url "http://localhost:5174/login"
