id: widget-initial
title: "Widget shows the closed trigger by default"
type: positive
description: |
  §5.1.1 — when the visitor lands on a page with the widget embedded, the
  widget is in its initial state: a single accessible button inviting the
  visitor to chat. The button must be focusable and keyboard-activatable.

start_location: "http://localhost:5175/"

preconditions:
  - The widget script is loaded on the page.

data: {}

steps:
  - locate: button "Chat with support"
  - focus: button "Chat with support"
