name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          # Writes a runner-local .npmrc so NODE_AUTH_TOKEN authenticates
          # the private @afixt/* packages. Kept out of the committed .npmrc
          # so local installs keep using the developer's own credentials.
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install Semgrep
        run: pip install semgrep

      - name: Install OSV-Scanner
        run: |
          curl -sSL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/

      - name: Install trufflehog
        run: curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Install lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress '**/*.md'

      # The integration tests return early on a null harness, so without a
      # database they pass while asserting nothing — a green check that means
      # nothing. Bring the real stack up and set REQUIRE_DB=1 below so an
      # unreachable stack fails loudly instead of silently skipping.
      - name: Start integration infrastructure
        run: |
          set -euo pipefail
          docker compose up -d mysql redis
          # Retry the readiness query itself: on a fresh volume the entrypoint
          # runs a temporary server that answers before the real one is up.
          deadline=$(( SECONDS + 120 ))
          until docker exec livechat-mysql mysql -ulivechat_user -plivechat_pass \
            -e 'SELECT 1' livechat_test >/dev/null 2>&1; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "MySQL did not become ready within 120s" >&2
              docker logs --tail 50 livechat-mysql >&2 || true
              exit 1
            fi
            sleep 1
          done
          docker exec livechat-redis redis-cli ping

      - run: npm run check:all
        env:
          REQUIRE_DB: "1"

  usecases-diff-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce usecase coverage (ADR-0002)
        if: "!contains(github.event.pull_request.labels.*.name, 'skip-usecases')"
        run: |
          bash scripts/ci-usecases-gate.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"

  usecases-specs-in-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          # Writes a runner-local .npmrc so NODE_AUTH_TOKEN authenticates
          # the private @afixt/* packages. Kept out of the committed .npmrc
          # so local installs keep using the developer's own credentials.
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Regenerate Playwright specs from usecases/
        run: npm run usecases:generate

      - name: Verify generated specs match what is committed
        run: |
          if ! git diff --quiet --exit-code -- '**/e2e/generated/'; then
            echo "::error::Generated Playwright specs are out of sync with usecases/."
            echo "Run 'npm run usecases:generate' locally and commit the result."
            git --no-pager diff -- '**/e2e/generated/' | head -60
            exit 1
          fi

  e2e:
    # Executes the cross-ends journeys and the runnable generated specs. Each
    # Playwright config brings up the stack (docker compose infra + a seeded
    # livechat_e2e database) via its webServer, so this only needs Node, the
    # browser, and Docker (present on the runner).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run e2e journeys + generated specs
        run: npm run test:e2e
