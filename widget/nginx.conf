server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Widget assets are loaded cross-origin from client sites.
  add_header Access-Control-Allow-Origin "*" always;
  add_header Cross-Origin-Resource-Policy "cross-origin" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  gzip on;
  gzip_types application/javascript application/json;
  gzip_min_length 512;

  # widget.js is the embed contract from requirements.md §6.2 — long
  # cache; version-bumping happens via a new filename or a query param
  # in the client's <script> tag.
  location = /widget.js {
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
