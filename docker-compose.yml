services:
  mysql:
    image: mysql:8.0
    container_name: livechat-mysql
    ports:
      - "23307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: livechat_root_pass
      MYSQL_DATABASE: livechat_db
      MYSQL_USER: livechat_user
      MYSQL_PASSWORD: livechat_pass
    volumes:
      - mysql_data:/var/lib/mysql
      # Creates livechat_test + livechat_e2e on first init (fresh volume / CI).
      - ./scripts/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: livechat-redis
    ports:
      - "26380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: livechat-mailhog
    ports:
      - "21026:1025"
      - "28026:8025"

  minio:
    image: minio/minio
    container_name: livechat-minio
    command: server /data --console-address ":9001"
    ports:
      - "29000:9000"
      - "29001:9001"
    environment:
      MINIO_ROOT_USER: livechat_minio
      MINIO_ROOT_PASSWORD: livechat_minio_pass
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: livechat-api
    ports:
      - "23001:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
      minio:
        condition: service_started
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: livechat_db
      DB_USER: livechat_user
      DB_PASS: livechat_pass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: livechat_minio
      S3_SECRET_KEY: livechat_minio_pass
      S3_BUCKET: livechat-attachments
      JWT_ACCESS_SECRET: dev-access-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      COOKIE_SECRET: dev-cookie-secret-change-me
      APP_URL: http://localhost:25174
      API_URL: http://localhost:23001
      WIDGET_URL: http://localhost:25175

  ui:
    build:
      context: ./ui
    container_name: livechat-ui
    ports:
      - "25174:80"
    depends_on:
      - api

  widget-preview:
    build:
      context: ./widget
    container_name: livechat-widget-preview
    ports:
      - "25175:80"
    depends_on:
      - api

volumes:
  mysql_data:
  minio_data:
